<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mentorix horizontal lockup: small medallion mark + wordmark.
  Use in app headers, splash, and any in-app spot where the brand identifies itself.
  Background is transparent — overlays cleanly on the dark theme bg (#080808).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="80" viewBox="0 0 380 80">
  <circle cx="40" cy="40" r="32" stroke="#D4FF44" stroke-width="2.5" fill="none"/>
  <path d="M 26 56 L 26 22 L 40 39 L 54 22 L 54 56" stroke="#D4FF44" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="92" y="55" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="44" font-weight="800" letter-spacing="-1.6" fill="#D4FF44">Mentorix</text>
</svg>
